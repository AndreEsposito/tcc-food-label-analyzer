services:
  - type: web
    name: food-label-analyzer-api
    env: python
    runtime: python-3.12
    region: ohio
    plan: free
    buildCommand: cd apps/backend && pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd apps/backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: GOOGLE_VISION_TIMEOUT_SECONDS
        value: "15"
